<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Spot - Spaces</title>
    <link rel="stylesheet" href="homepage.css">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400&family=Inter:wght@400;500;600&family=Instrument+Sans:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">

        <!-- Back button -->
        <a href="login.html" class="back-link" aria-label="Back to Login">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15.8267 9.99584H4.16493" stroke="#6B5444" stroke-width="1.66597" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M9.99584 15.8292L4.16251 9.99584L9.99584 4.16251" stroke="#6B5444" stroke-width="1.66597" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </a>

        <!-- Main content -->
        <div class="header">
            <h1>Focus Spot</h1>
            <p>Find your perfect study space</p>
        </div>

        <div class="divider"></div>

        <div class="spots-list">
            <!-- Spot 1 -->
            <a href="univlib.html" class="spot-card">
                <div class="spot-image">
                    <img src="https://i.postimg.cc/q7J1dbg4/university-library.jpg">
                </div>
                <div class="spot-info">
                    <h3>University Main Library</h3>
                    <div class="spot-rating">
                        <span>⭐</span> <span class="rating-val">4.5</span>
                    </div>
                    <div class="spot-tags">
                        <span class="tag tag-quiet">Quiet</span>
                        <span class="tag tag-crowded">Crowded</span>
                    </div>
                </div>
                <div class="spot-arrow">
                    <svg viewBox="0 0 8 14" fill="none">
                        <path d="M1 1L6.66667 6.66667L1 12.3333" stroke="#9B8674" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Spot 2 -->
            <a href="hq.html" class="spot-card">
                <div class="spot-image">
                    <img src="https://i.postimg.cc/76Qs93xV/headquarters-iligan.jpg" alt="Headquarters Iligan">
                </div>
                <div class="spot-info">
                    <h3>Headquarters Iligan</h3>
                    <div class="spot-rating">
                        <span>⭐</span> <span class="rating-val">4.2</span>
                    </div>
                    <div class="spot-tags">
                        <span class="tag tag-quiet">Quiet</span>
                        <span class="tag tag-moderate">Moderate</span>
                    </div>
                </div>
                <div class="spot-arrow">
                    <svg viewBox="0 0 8 14" fill="none">
                        <path d="M1 1L6.66667 6.66667L1 12.3333" stroke="#9B8674" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Spot 3 -->
            <a href="casslib.html" class="spot-card">
                <div class="spot-image">
                    <img src="https://i.postimg.cc/Y2RqrjdJ/cass-lib.jpg" alt="CASS Library">
                </div>
                <div class="spot-info">
                    <h3>CASS Library</h3>
                    <div class="spot-rating">
                        <span>⭐</span> <span class="rating-val">4.8</span>
                    </div>
                    <div class="spot-tags">
                        <span class="tag tag-quiet">Quiet</span>
                        <span class="tag tag-crowded">Crowded</span>
                    </div>
                </div>
                <div class="spot-arrow">
                    <svg viewBox="0 0 8 14" fill="none">
                        <path d="M1 1L6.66667 6.66667L1 12.3333" stroke="#9B8674" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Spot 4 -->
            <a href="bnb.html" class="spot-card">
                <div class="spot-image">
                    <img src="https://i.postimg.cc/hvtnzb2V/bread-and-brew.jpg" alt="Bread & Brew Cafe">
                </div>
                <div class="spot-info">
                    <h3>Bread & Brew Cafe</h3>
                    <div class="spot-rating">
                        <span>⭐</span> <span class="rating-val">4.6</span>
                    </div>
                    <div class="spot-tags">
                        <span class="tag tag-quiet">Quiet</span>
                        <span class="tag tag-few">Few</span>
                    </div>
                </div>
                <div class="spot-arrow">
                    <svg viewBox="0 0 8 14" fill="none">
                        <path d="M1 1L6.66667 6.66667L1 12.3333" stroke="#9B8674" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>

            <!-- Spot 5 -->
            <a href="slounge.html" class="spot-card">
                <div class="spot-image">
                    <img src="https://i.postimg.cc/LskFx07W/study-lounge.jpg" alt="The Study Lounge">
                </div>
                <div class="spot-info">
                    <h3>The Study Lounge</h3>
                    <div class="spot-rating">
                        <span>⭐</span> <span class="rating-val">4.3</span>
                    </div>
                    <div class="spot-tags">
                        <span class="tag tag-buzzing">Buzzing</span>
                        <span class="tag tag-crowded">Crowded</span>
                    </div>
                </div>
                <div class="spot-arrow">
                    <svg viewBox="0 0 8 14" fill="none">
                        <path d="M1 1L6.66667 6.66667L1 12.3333" stroke="#9B8674" stroke-width="1.67" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            </a>
        </div>

        <div class="bottom-action">
            <div class="bottom-divider"></div>
            <button class="button-study-now" onclick="window.location.href='study.html'">Study Now</button>
        </div>
    </div>
</body>
</html>
